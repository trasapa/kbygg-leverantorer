<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leverantörsregister — KBYGG</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');
  :root{
    --bg:#0f1117;--surface:#181c27;--surface2:#1e2333;--surface3:#252b3d;
    --border:#2a3045;--border2:#353d55;
    --text:#e8eaf0;--text2:#8b92a8;--text3:#4e566b;
    --accent:#4f8ef7;--accent-dim:#1a2d54;--accent-text:#93bbfc;
    --green:#3ecf8e;--green-dim:#0d2e20;--green-text:#6ee7b7;
    --amber:#f5a623;--red:#f04040;--red-dim:#2e0d0d;--red-text:#fca5a5;
    --radius:10px;--radius-sm:6px;--radius-xs:4px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5}
  .topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 1.75rem;display:flex;align-items:center;gap:1.25rem;height:54px;position:sticky;top:0;z-index:100}
  .logo{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:500;color:#F26522;letter-spacing:.08em;text-transform:uppercase;border-right:1px solid var(--border);padding-right:1.25rem}
  .topbar-title{font-size:14px;font-weight:600;color:var(--text);flex:1}
  .topbar-actions{display:flex;align-items:center;gap:8px}
  .status-area{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace;padding:0 1rem;border-left:1px solid var(--border);border-right:1px solid var(--border);white-space:nowrap}
  .sdot{width:6px;height:6px;border-radius:50%;background:var(--text3);flex-shrink:0;transition:background .3s}
  .sdot.saved{background:var(--green)}.sdot.unsaved{background:var(--amber)}
  .btn{display:inline-flex;align-items:center;gap:6px;padding:0 13px;height:32px;border-radius:var(--radius-sm);font-size:12px;font-family:'Inter',sans-serif;font-weight:500;cursor:pointer;border:1px solid var(--border2);background:var(--surface2);color:var(--text2);transition:all .15s;white-space:nowrap}
  .btn:hover{background:var(--surface3);color:var(--text)}
  .btn:disabled{opacity:.35;cursor:not-allowed;pointer-events:none}
  .btn-accent{background:var(--accent);color:#fff;border-color:var(--accent)}.btn-accent:hover{background:#3d7ef5;color:#fff}
  .btn-green{background:var(--green-dim);color:var(--green-text);border-color:#1a5c3a}.btn-green:hover{background:#0f3a26}
  .btn-ghost{background:none;border:none;color:var(--text3);padding:3px 6px;height:26px;font-size:13px;border-radius:var(--radius-xs);cursor:pointer;display:inline-flex;align-items:center;gap:4px}
  .btn-ghost:hover{background:var(--surface3);color:var(--text)}
  .btn-ghost.danger:hover{color:var(--red-text);background:var(--red-dim)}
  .btn-sm{height:28px;padding:0 10px;font-size:12px}
  .btn-save{background:var(--green-dim);color:var(--green-text);border-color:#1a5c3a;font-size:12px;height:28px;padding:0 10px}
  .btn-save:hover{background:#0f3a26}
  .btn-cancel{background:var(--surface3);color:var(--text2);border-color:var(--border);font-size:12px;height:28px;padding:0 10px}
  .btn-cancel:hover{background:var(--border)}
  .container{max-width:1080px;margin:0 auto;padding:1.75rem}
  .list-area{min-width:0}
  .cat-panel{background:#1a1f30;border:1px solid #3a4060;border-radius:var(--radius);margin-bottom:1.25rem;overflow:hidden}
  .cat-panel-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;cursor:pointer;user-select:none;transition:background .15s}
  .cat-panel-hdr:hover{background:#222840}
  .cat-panel-title{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;display:flex;align-items:center;gap:8px}
  .cat-panel-title span.ccount{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text3);background:var(--surface3);border:1px solid var(--border);border-radius:999px;padding:1px 7px}
  .cat-panel-body{border-top:1px solid var(--border);padding:14px}
  .cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:4px;margin-bottom:12px}
  .add-cat-row{display:flex;gap:8px;max-width:380px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem}
  .card+.card{margin-top:1rem}
  .card-title{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:14px}
  .form-row{display:grid;grid-template-columns:1fr 1fr 1.3fr auto auto;gap:10px;align-items:end}
  .field{display:flex;flex-direction:column;gap:5px}
  .field label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em}
  input[type=text],select{font-family:'Inter',sans-serif;font-size:13px;height:34px;padding:0 10px;border:1px solid var(--border2);border-radius:var(--radius-sm);background:var(--surface2);color:var(--text);outline:none;transition:border-color .15s;width:100%}
  input[type=text]:focus,select:focus{border-color:var(--accent)}
  input[type=text]::placeholder{color:var(--text3)}
  select option{background:var(--surface2)}
  .chk-field{display:flex;flex-direction:column;align-items:center;gap:6px}
  .chk-field label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em}
  input[type=checkbox]{width:16px;height:16px;cursor:pointer;accent-color:var(--accent)}
  .cat-item{display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--surface2);border-radius:var(--radius-xs);border:1px solid var(--border)}
  .cat-item span.name{font-size:13px;color:var(--text);flex:1}
  .cat-item span.cnt{font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace}
  .add-cat-row input{flex:1;height:30px;font-size:13px}
  .section{margin-bottom:6px}
  .sec-header{display:flex;align-items:center;gap:10px;padding:8px 14px;background:#1a1f30;border:1px solid #3a4060;border-radius:var(--radius);cursor:pointer;user-select:none;transition:background .15s}
  .sec-header:hover{background:#222840}
  .arrow{font-size:9px;color:var(--text3);transition:transform .18s}
  .arrow.open{transform:rotate(90deg)}
  .sec-cat{font-size:13px;font-weight:600;color:var(--text);flex:1}
  .cpill{font-size:10px;color:var(--text3);background:var(--surface3);border:1px solid var(--border);border-radius:999px;padding:1px 8px;font-family:'JetBrains Mono',monospace}
  .sup-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-top:3px;overflow:hidden;transition:border-color .15s}
  .sup-card:hover{border-color:var(--border2)}
  .sup-row{display:grid;grid-template-columns:1.4fr 1.1fr 1fr auto auto auto;gap:12px;align-items:center;padding:9px 14px}
  .sup-name{font-size:13px;font-weight:600;color:var(--text)}
  .sup-portal a{font-size:12px;color:var(--accent-text);text-decoration:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:block}
  .sup-portal a:hover{text-decoration:underline}
  .sup-portal .none{font-size:12px;color:var(--text3)}
  .badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:2px 8px;border-radius:999px;font-weight:500}
  .badge-yes{background:var(--green-dim);color:var(--green-text);border:1px solid #1a5c3a}
  .badge-no{background:var(--surface3);color:var(--text3);border:1px solid var(--border)}
  .edit-area{border-top:1px solid var(--border);padding:11px 14px;background:var(--surface2)}
  .edit-grid{display:grid;grid-template-columns:1.2fr .9fr 1.3fr auto auto auto;gap:10px;align-items:end}
  .edit-grid input,.edit-grid select{font-size:12px;height:30px}
  .contacts-area{border-top:1px solid var(--border);padding:11px 14px;background:var(--surface2)}
  .contacts-lbl{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:9px}
  .contact-row{display:grid;grid-template-columns:1fr 1fr 1fr 1fr auto auto;gap:8px;align-items:center;padding:6px 10px;background:var(--surface);border-radius:var(--radius-xs);margin-bottom:4px;border:1px solid var(--border)}
  .contact-row span{font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)}
  .contact-row span.mail{color:var(--accent-text)}
  .contact-row span.tel{color:var(--text2)}
  .contact-row span.note{color:var(--text2);font-size:11px}
  .add-con-row{display:grid;grid-template-columns:1fr 1fr 1fr 1fr auto;gap:8px;margin-top:7px}
  .add-con-row input{height:29px;font-size:12px}
  .empty{font-size:12px;color:var(--text3);font-style:italic;padding:3px 0 7px}
  .toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(14px);background:var(--surface3);color:var(--text);border:1px solid var(--border2);font-size:12px;padding:8px 18px;border-radius:var(--radius);opacity:0;transition:opacity .22s,transform .22s;pointer-events:none;z-index:9999;font-family:'JetBrains Mono',monospace}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:999px}
</style>
</head>
<body>
<div class="topbar">
  <div class="logo">KBYGG</div>
  <div class="topbar-title">Leverantörsregister</div>
  <div class="status-area">
    <span class="sdot" id="sdot"></span>
    <span id="stxt">Ingen fil öppnad</span>
  </div>
  <div class="topbar-actions">
    <button class="btn btn-green" id="btn-save" onclick="saveFile()" disabled>💾 Spara</button>
  </div>
</div>

<div class="container">
  <div class="cat-panel" id="cat-panel">
    <div class="cat-panel-hdr" onclick="toggleCatPanel()">
      <div class="cat-panel-title">
        <span class="arrow" id="cat-arrow">▶</span>
        Produktkategorier
        <span class="ccount" id="cat-count">0</span>
      </div>
      <span style="font-size:11px;color:var(--text3)" id="cat-hint">Klicka för att hantera kategorier</span>
    </div>
    <div class="cat-panel-body" id="cat-body" style="display:none">
      <div class="cat-grid" id="cat-list"></div>
      <div class="add-cat-row">
        <input type="text" id="inp-newcat" placeholder="Ny kategori..." onkeydown="if(event.key==='Enter')addCat()">
        <button class="btn btn-accent btn-sm" onclick="addCat()">+ Lägg till</button>
      </div>
    </div>
  </div>

  <div class="cat-panel" id="sup-panel" style="margin-bottom:1.25rem">
    <div class="cat-panel-hdr" onclick="toggleSupPanel()">
      <div class="cat-panel-title">
        <span class="arrow" id="sup-arrow">▶</span>
        Ny leverantör
      </div>
      <span style="font-size:11px;color:var(--text3)" id="sup-hint">Klicka för att lägga till</span>
    </div>
    <div class="cat-panel-body" id="sup-body" style="display:none">
      <div class="form-row">
        <div class="field"><label>Namn</label><input type="text" id="inp-name" placeholder="Företagsnamn" onkeydown="if(event.key==='Enter')addSupplier()"></div>
        <div class="field"><label>Kategori</label><select id="inp-cat"></select></div>
        <div class="field"><label>Portal (URL)</label><input type="text" id="inp-portal" placeholder="https://..."></div>
        <div class="chk-field"><label>Avtal</label><input type="checkbox" id="inp-avtal"></div>
        <button class="btn btn-accent" onclick="addSupplier()" style="align-self:end">+ Lägg till</button>
      </div>
    </div>
  </div>
  <div id="list"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbzr_t6NCs2rR-X2T24n_TZliksNTlv4GPep5GjQQ8vPcQHt83hOy8z2ykFc7SXlC7hQ/exec';
let data={},cats=[],hasUnsaved=false;
const DEFAULT=['Fönster','Dörrar','Tak','Fasad','Golv','VVS','El','Isolering','Övrigt'];

async function init(){
  setStatus('loading');
  try{
    const r=await fetch(API+'?action=load');
    const d=await r.json();
    if(d.error)throw new Error(d.error);
    loadData(d);
    setStatus('saved');
    toast('✓ Data inläst');
  }catch(e){
    setStatus('error');
    toast('Kunde inte hämta data: '+e.message);
    loadData({cats:DEFAULT,data:{}});
  }
}

function toggleSupPanel(){
  const body=document.getElementById('sup-body');
  const arrow=document.getElementById('sup-arrow');
  const hint=document.getElementById('sup-hint');
  const open=body.style.display==='none';
  body.style.display=open?'block':'none';
  arrow.className='arrow'+(open?' open':'');
  hint.textContent=open?'':'Klicka för att lägga till';
  if(open)setTimeout(()=>document.getElementById('inp-name').focus(),50);
}

function toggleCatPanel(){
  const body=document.getElementById('cat-body');
  const arrow=document.getElementById('cat-arrow');
  const hint=document.getElementById('cat-hint');
  const open=body.style.display==='none';
  body.style.display=open?'block':'none';
  arrow.className='arrow'+(open?' open':'');
  hint.textContent=open?'':'Klicka för att hantera kategorier';
}

function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

function setStatus(s){
  const dot=document.getElementById('sdot'),txt=document.getElementById('stxt'),btn=document.getElementById('btn-save');
  if(s==='saved'){dot.className='sdot saved';txt.textContent='Synkad';btn.disabled=false;hasUnsaved=false;}
  else if(s==='unsaved'){dot.className='sdot unsaved';txt.textContent='Osparade ändringar';btn.disabled=false;hasUnsaved=true;}
  else if(s==='saving'){dot.className='sdot unsaved';txt.textContent='Sparar...';btn.disabled=true;}
  else if(s==='loading'){dot.className='sdot';txt.textContent='Hämtar data...';btn.disabled=true;}
  else if(s==='error'){dot.className='sdot';txt.textContent='Anslutningsfel';btn.disabled=false;}
}
function markUnsaved(){setStatus('unsaved');}

window.addEventListener('beforeunload',e=>{if(hasUnsaved){e.preventDefault();e.returnValue='';}});
window.addEventListener('keydown',e=>{if((e.ctrlKey||e.metaKey)&&e.key==='s'){e.preventDefault();saveFile();}});

async function saveFile(){
  setStatus('saving');
  try{
    const r=await fetch(API,{
      method:'POST',
      body:JSON.stringify({action:'save',data:buildClean()})
    });
    const d=await r.json();
    if(d.error)throw new Error(d.error);
    setStatus('saved');
    toast('💾 Sparat');
  }catch(e){
    setStatus('error');
    toast('Fel vid sparning: '+e.message);
  }
}

function loadData(d){
  data=d.data||{};
  cats=d.cats&&d.cats.length?d.cats:[...DEFAULT];
  Object.values(data).forEach(g=>g.suppliers.forEach(s=>s.editing=false));
  renderCats();renderCatSel();render();
}

function buildClean(){
  const c={};
  Object.entries(data).forEach(([cat,g])=>{
    c[cat]={open:g.open,suppliers:g.suppliers.map(s=>({id:s.id,name:s.name,portal:s.portal,avtal:s.avtal,contacts:s.contacts,showContacts:s.showContacts}))};
  });
  return{cats,data:c};
}

function addCat(){
  const inp=document.getElementById('inp-newcat'),v=inp.value.trim();
  if(!v||cats.includes(v))return;
  cats.push(v);inp.value='';
  renderCats();renderCatSel();markUnsaved();
}

function removeCat(cat){
  const n=data[cat]?data[cat].suppliers.length:0;
  if(n>0&&!confirm(`"${cat}" har ${n} leverantör(er). Ta bort ändå?`))return;
  cats=cats.filter(c=>c!==cat);
  if(data[cat])delete data[cat];
  renderCats();renderCatSel();render();markUnsaved();
}

function renderCats(){
  const el=document.getElementById('cat-list');
  document.getElementById('cat-count').textContent=cats.length;
  if(!cats.length){el.innerHTML='<p class="empty">Inga kategorier.</p>';return;}
  el.innerHTML=cats.map(c=>{
    const n=data[c]?data[c].suppliers.length:0;
    return `<div class="cat-item">
      <span class="name">${c}</span>
      <span class="cnt">${n>0?n:'—'}</span>
      <button class="btn-ghost danger" onclick="removeCat('${c}')" title="Ta bort" style="font-size:11px">✕</button>
    </div>`;
  }).join('');
}

function renderCatSel(){
  const sel=document.getElementById('inp-cat'),cur=sel.value;
  sel.innerHTML=cats.map(c=>`<option${c===cur?' selected':''}>${c}</option>`).join('');
}

function addSupplier(){
  const name=document.getElementById('inp-name').value.trim();
  const cat=document.getElementById('inp-cat').value;
  const portal=document.getElementById('inp-portal').value.trim();
  const avtal=document.getElementById('inp-avtal').checked;
  if(!name||!cat){document.getElementById('inp-name').focus();return;}
  if(!data[cat])data[cat]={open:true,suppliers:[]};
  data[cat].suppliers.push({id:Date.now(),name,portal,avtal,contacts:[],showContacts:false,editing:false});
  document.getElementById('inp-name').value='';
  document.getElementById('inp-portal').value='';
  document.getElementById('inp-avtal').checked=false;
  document.getElementById('inp-name').focus();
  renderCats();markUnsaved();render();
}

function removeSupplier(cat,id){
  if(!confirm('Ta bort '+findSup(cat,id).name+'?'))return;
  data[cat].suppliers=data[cat].suppliers.filter(s=>s.id!==id);
  if(!data[cat].suppliers.length)delete data[cat];
  renderCats();markUnsaved();render();
}

function toggleEdit(cat,id){
  const s=findSup(cat,id);s.editing=!s.editing;render();
  if(s.editing){
    document.getElementById('en-'+id).value=s.name;
    document.getElementById('ec-'+id).value=cat;
    document.getElementById('ep-'+id).value=s.portal||'';
    document.getElementById('ea-'+id).checked=s.avtal;
  }
}

function saveEdit(cat,id){
  const s=findSup(cat,id);
  const nn=document.getElementById('en-'+id).value.trim();
  const nc=document.getElementById('ec-'+id).value;
  const np=document.getElementById('ep-'+id).value.trim();
  const na=document.getElementById('ea-'+id).checked;
  if(!nn)return;
  s.name=nn;s.portal=np;s.avtal=na;s.editing=false;
  if(nc!==cat){
    if(!data[nc])data[nc]={open:true,suppliers:[]};
    data[nc].suppliers.push({...s});
    data[cat].suppliers=data[cat].suppliers.filter(x=>x.id!==id);
    if(!data[cat].suppliers.length)delete data[cat];
  }
  renderCats();markUnsaved();render();
}

function addContact(cat,sid){
  const n=document.getElementById('cn-'+sid).value.trim();
  const m=document.getElementById('cm-'+sid).value.trim();
  const p=document.getElementById('cp-'+sid).value.trim();
  const k=document.getElementById('ck-'+sid).value.trim();
  if(!n)return;
  findSup(cat,sid).contacts.push({id:Date.now(),name:n,mail:m,tel:p,kommentar:k});
  markUnsaved();render();
}

function editContact(cat,sid,cid){
  const sup=findSup(cat,sid);
  sup.contacts.forEach(c=>c.editing=false);
  sup.contacts.find(c=>c.id===cid).editing=true;
  render();
}
function cancelEditContact(cat,sid,cid){
  findSup(cat,sid).contacts.find(c=>c.id===cid).editing=false;
  render();
}
function saveContact(cat,sid,cid){
  const c=findSup(cat,sid).contacts.find(c=>c.id===cid);
  c.name=document.getElementById('een-'+cid).value.trim()||c.name;
  c.mail=document.getElementById('eem-'+cid).value.trim();
  c.tel=document.getElementById('eep-'+cid).value.trim();
  c.kommentar=document.getElementById('eek-'+cid).value.trim();
  c.editing=false;
  markUnsaved();render();
}
function removeContact(cat,sid,cid){
  findSup(cat,sid).contacts=findSup(cat,sid).contacts.filter(c=>c.id!==cid);
  markUnsaved();render();
}

function toggleCat(cat){data[cat].open=!data[cat].open;render();}
function toggleContacts(cat,id){findSup(cat,id).showContacts=!findSup(cat,id).showContacts;render();}
function findSup(cat,id){return data[cat].suppliers.find(s=>s.id===id);}

function fmtPortal(url){
  if(!url)return '<span class="none">—</span>';
  const h=url.startsWith('http')?url:'https://'+url;
  try{const u=new URL(h);return `<a href="${h}" target="_blank">${u.hostname}</a>`;}
  catch{return `<a href="${h}" target="_blank">${url}</a>`;}
}

function catOpts(sel){return cats.map(c=>`<option${c===sel?' selected':''}>${c}</option>`).join('');}

function render(){
  const el=document.getElementById('list');
  if(!Object.keys(data).length){el.innerHTML='<p class="empty" style="padding:1.5rem 0;text-align:center">Inga leverantörer ännu.</p>';return;}
  el.innerHTML=Object.entries(data).map(([cat,g])=>`
    <div class="section">
      <div class="sec-header" onclick="toggleCat('${cat}')">
        <span class="arrow ${g.open?'open':''}">▶</span>
        <span class="sec-cat">${cat}</span>
        <span class="cpill">${g.suppliers.length}</span>
      </div>
      ${g.open?g.suppliers.map(s=>`
        <div class="sup-card">
          <div class="sup-row">
            <div class="sup-name">${s.name}</div>
            <div class="sup-portal">${fmtPortal(s.portal)}</div>
            <div><span class="badge ${s.avtal?'badge-yes':'badge-no'}">${s.avtal?'✓ Avtal':'Inget avtal'}</span></div>
            <button class="btn-ghost" title="${s.editing?'Avbryt':'Redigera'}" onclick="toggleEdit('${cat}',${s.id})">${s.editing?'✕':'✏️'}</button>
            <button class="btn-ghost" title="Kontakter" onclick="toggleContacts('${cat}',${s.id})">👤 <span style="font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--text3)">${s.contacts.length}</span></button>
            <button class="btn-ghost danger" title="Ta bort" onclick="removeSupplier('${cat}',${s.id})">✕</button>
          </div>
          ${s.editing?`
          <div class="edit-area">
            <div class="edit-grid">
              <div class="field"><label>Namn</label><input type="text" id="en-${s.id}"></div>
              <div class="field"><label>Kategori</label><select id="ec-${s.id}">${catOpts(cat)}</select></div>
              <div class="field"><label>Portal</label><input type="text" id="ep-${s.id}" placeholder="https://..."></div>
              <div class="chk-field" style="justify-content:flex-end;padding-bottom:2px"><label>Avtal</label><input type="checkbox" id="ea-${s.id}"></div>
              <button class="btn btn-save" onclick="saveEdit('${cat}',${s.id})" style="align-self:end">Spara</button>
              <button class="btn btn-cancel" onclick="toggleEdit('${cat}',${s.id})" style="align-self:end">Avbryt</button>
            </div>
          </div>`:''}
          ${s.showContacts?`
          <div class="contacts-area">
            <div class="contacts-lbl">Kontakter</div>
            ${s.contacts.length?s.contacts.map(c=>`
              ${c.editing?`
              <div class="contact-row">
                <input type="text" id="een-${c.id}" value="${c.name||''}" placeholder="Namn" style="height:26px;font-size:12px">
                <input type="text" id="eem-${c.id}" value="${c.mail||''}" placeholder="E-post" style="height:26px;font-size:12px">
                <input type="text" id="eep-${c.id}" value="${c.tel||''}" placeholder="Telefon" style="height:26px;font-size:12px">
                <input type="text" id="eek-${c.id}" value="${c.kommentar||''}" placeholder="Kommentar" style="height:26px;font-size:12px">
                <button class="btn-ghost" onclick="saveContact('${cat}',${s.id},${c.id})" style="font-size:11px;color:var(--green-text)">✓</button>
                <button class="btn-ghost danger" onclick="cancelEditContact('${cat}',${s.id},${c.id})" style="font-size:11px">✕</button>
              </div>`:`
              <div class="contact-row">
                <span>${c.name}</span>
                <span class="mail">${c.mail||'—'}</span>
                <span class="tel">${c.tel||'—'}</span>
                <span class="note">${c.kommentar||'—'}</span>
                <button class="btn-ghost" onclick="editContact('${cat}',${s.id},${c.id})" style="font-size:11px" title="Redigera">✏️</button>
                <button class="btn-ghost danger" onclick="removeContact('${cat}',${s.id},${c.id})" style="font-size:11px" title="Ta bort">✕</button>
              </div>`}
            `).join(''):'<p class="empty">Inga kontakter tillagda.</p>'}
            <div class="add-con-row">
              <input type="text" id="cn-${s.id}" placeholder="Namn">
              <input type="text" id="cm-${s.id}" placeholder="E-post">
              <input type="text" id="cp-${s.id}" placeholder="Telefon">
              <input type="text" id="ck-${s.id}" placeholder="Kommentar">
              <button class="btn btn-accent btn-sm" onclick="addContact('${cat}',${s.id})">+</button>
            </div>
          </div>`:''}
        </div>
      `).join(''):''}
    </div>
  `).join('');
}

init();
</script>
</body>
</html>
